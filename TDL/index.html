<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset='utf-8' />
  <!-- 화면 해상도에 따라 글자 크기 대응(모바일 대응) -->
  <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>시작 전용 TDL</title>
  <!-- jquery CDN -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- fullcalendar CDN -->
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@5.8.0/main.min.css' rel='stylesheet' />
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.8.0/main.min.js'></script>
  <!-- fullcalendar 언어 CDN -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@5.8.0/locales-all.min.js'></script>
<style>
  /* body 스타일 */
  html, body {
    overflow: hidden;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
  }
  /* 캘린더 위의 해더 스타일(날짜가 있는 부분) */
  .fc-header-toolbar {
    padding-top: 1em;
    padding-left: 1em;
    padding-right: 1em;
  }
  .nomalBtn{
    color: #fff;
    background-color: #76828e;
    border-color: #76828e;
  }
  .activeBtn{
    color: #fff;
    background-color: #1a252f;
    border-color: #151e27;
  }
</style>
</head>
<body>
  <!-- 시간 -->
  <div style="text-align: center; border-bottom: 1px dotted; padding: 8px 0px;">
    <div id="date" style="font-size: 18px;"></div>
    <div id="clock" style="font-size: 32px; font-weight: bold;"></div>
  </div>
  <!-- calendar -->
  <div id='calendar-container' style="width: 50%; float: left;">
    <div id='calendar'></div>
    <div>
      <button onclick="plus()" id="plusBtn" class="nomalBtn">추가<b style="color: green; font-size: 15px;"> ✚</b></button>
      <button onclick="minus()" id="minusBtn" class="nomalBtn" style="border-top-width: 3px; padding-bottom: 2px;">제거❌</button>
    </div>
  </div>
  <!-- todolist -->
  <div style="width: 50%; float: right; height: 626px;">
    <div style="text-align: center;">
      <h1 id="listTitle" style="margin-bottom: 0px;"></h1>
      <p style="color: #918f8f; margin-top: 5px; margin-bottom: 10px;">매일 해야하는 것 - 비타민 먹기, 방청소 하기</p>
      <form id="js-todoform">
        <input id="js-input" type="text" placeholder="메모를 작성하고 Enter를 눌러주세요." style="width: 60%; height: 40px; text-align: center;">
      </form>
    </div>
    <div style="width: 50%; float: left; text-align: center; height: 500px;">
      <h3>To Do List</h3>
      <ul id="js-todolist"></ul>
    </div>
    <div style="width: 50%; float: right; text-align: center; height: 500px;">
      <h3>Finish List</h3>
      <ul id="js-finishlist"></ul>
    </div>
  </div>
  
  <script src="tdl.js"></script>
  <script src="clock.js"></script>
  <script src="calendar.js?ver=4"></script>
  <script>
    var now = new Date();
    var clock = now.toString();
    var day=dayReturn(clock);
    listStart(day);
    $('#listTitle').html(todayReturn(clock));
    $('.fc-event-time').remove();
    $( 'button.fc-prev-button, button.fc-next-button, button.fc-dayGridMonth-button, button.fc-today-button' ).click( function() {
      $('.fc-event-time').remove();
    } );
  </script>
</body>
</html>
